<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - StockFlow</title>
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="theme-login">
    <main class="login-shell">
      <section class="login-panel">
        <h1>Entrar</h1>
        <p>Use suas credenciais para acessar o painel correto.</p>
        <form class="login-form">
          <label>
            Email
            <input type="email" placeholder="voce@empresa.com" />
          </label>
          <label>
            Senha
            <input type="password" placeholder="********" />
          </label>
          <button type="button">Acessar</button>
        </form>
        <div class="login-links">
          <a href="/">Voltar</a>
          <a href="#">Esqueci minha senha</a>
        </div>
      </section>
      <aside class="login-aside">
        <h2>Visão rápida</h2>
        <ul>
          <li>Monitoramento em tempo real</li>
          <li>Controle por perfil</li>
          <li>Histórico de movimentações</li>
        </ul>
      </aside>
    </main>
  </body>
</html>
