services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockflow-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
  mongo:
    image: mongo:7
    container_name: stockflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
volumes:
  mongo_data:
